name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  openapi:
    name: Validate OpenAPI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Lint openapi.yaml (Redocly)
        run: npx @redocly/cli@latest lint openapi.yaml

      - name: Bundle openapi.yaml (verify all $refs resolve)
        run: npx @redocly/cli@latest bundle openapi.yaml -o "${RUNNER_TEMP}/bundle.yaml"

  examples:
    name: Lint examples
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Syntax-check Node example
        run: node --check examples/check.mjs

      - name: Syntax-check Python example
        run: python -m py_compile examples/check.py

      - name: Syntax-check shell example
        run: bash -n examples/check.sh
